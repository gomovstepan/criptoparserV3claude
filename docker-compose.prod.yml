# Production-оверрайды (Фаза 15). Применять поверх базового compose:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Добавляет: лимиты ресурсов, рестарт-политику, ротацию логов, а также
# сервисы мониторинга Prometheus (:9090) и Grafana (:3000).

x-prod-defaults: &prod
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  timescaledb:
    <<: *prod
    deploy:
      resources:
        limits: { cpus: "1.5", memory: 1g }

  redis:
    <<: *prod
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512m }

  collector:
    <<: *prod
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512m }

  scanner:
    <<: *prod
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512m }

  executor:
    <<: *prod
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512m }

  notifier:
    <<: *prod
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256m }

  api-gateway:
    <<: *prod
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512m }

  frontend:
    <<: *prod
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256m }

  # ── Мониторинг ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: arb-prometheus
    <<: *prod
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [arbitrage-net]

  grafana:
    image: grafana/grafana:latest
    container_name: arb-grafana
    <<: *prod
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/criptoparser.json:ro
      - grafana_data:/var/lib/grafana
    depends_on: [prometheus]
    networks: [arbitrage-net]

volumes:
  prometheus_data:
  grafana_data:
