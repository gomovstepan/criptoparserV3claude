# Крипто-арбитражная система — оркестрация инфраструктуры и микросервисов.
# Сеть arbitrage-net; shared/ монтируется в каждый backend как read-only пакет.
# Прод-настройки (restart, ротация docker-логов, лимиты ресурсов) встроены сюда.
#
# Запуск:
#   docker compose up -d --build
# Мониторинг (Prometheus/Grafana/Loki/Promtail) — отдельный файл:
#   docker compose -f docker-compose.monitoring.yml up -d

x-prod-defaults: &prod
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-healthcheck-defaults: &svc-healthcheck
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 20s

services:
  # ── Данные ──────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg18
    container_name: arb-timescaledb
    <<: *prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # PostgreSQL 18+ хранит данные в подкаталоге версии; том монтируется в /var/lib/postgresql
      - tsdb_data:/var/lib/postgresql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits: { cpus: "1.5", memory: 1g }
    networks: [arbitrage-net]

  redis:
    image: redis:7-alpine
    container_name: arb-redis
    <<: *prod
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly no
      --save ""
      --maxmemory 400mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512m }
    networks: [arbitrage-net]

  # ── Микросервисы ────────────────────────────────────────────────────────
  collector:
    build: ./collector
    container_name: arb-collector
    <<: *prod
    env_file: .env
    volumes:
      - ./shared:/app/shared:ro
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    healthcheck:
      <<: *svc-healthcheck
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512m }
    networks: [arbitrage-net]

  scanner:
    build: ./scanner
    container_name: arb-scanner
    <<: *prod
    env_file: .env
    volumes:
      - ./shared:/app/shared:ro
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    healthcheck:
      <<: *svc-healthcheck
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512m }
    networks: [arbitrage-net]

  executor:
    build: ./executor
    container_name: arb-executor
    <<: *prod
    env_file: .env
    volumes:
      - ./shared:/app/shared:ro
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    healthcheck:
      <<: *svc-healthcheck
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512m }
    networks: [arbitrage-net]

  notifier:
    build: ./notifier
    container_name: arb-notifier
    <<: *prod
    env_file: .env
    volumes:
      - ./shared:/app/shared:ro
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    healthcheck:
      <<: *svc-healthcheck
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256m }
    networks: [arbitrage-net]

  api-gateway:
    build: ./api-gateway
    container_name: arb-api-gateway
    <<: *prod
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./shared:/app/shared:ro
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    healthcheck:
      <<: *svc-healthcheck
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512m }
    networks: [arbitrage-net]

  frontend:
    build: ./frontend
    container_name: arb-frontend
    <<: *prod
    ports:
      - "5173:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256m }
    networks: [arbitrage-net]

volumes:
  tsdb_data:
  redis_data:

networks:
  arbitrage-net:
    name: arbitrage-net
    driver: bridge
